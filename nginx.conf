server {
    listen 80;
    listen [::]:80;
    server_name brainrotbattle.io www.brainrotbattle.io;

    root /home/chris/brainrotbattle/dist;
    index index.html;

    # Gzip + Brotli compression for Three.js bundle
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/octet-stream
        text/css
        text/html
        text/javascript
        text/plain
        image/svg+xml
        model/gltf+json
        model/gltf-binary;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|glb|gltf|ktx2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Main entry
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to source files
    location ~ /\. {
        deny all;
    }
    location ~ ^/(src|node_modules|package\.json|package-lock\.json) {
        deny all;
    }
}
